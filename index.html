<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vamos 📝</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; color: #333; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #1a73e8; font-size: 2rem; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        button:hover { background: #1557b0; }
        #resultado-container { margin-top: 25px; padding: 15px; background: #e8f0fe; border-radius: 8px; display: none; }
        #texto-final { width: 100%; height: 120px; margin-bottom: 10px; padding: 10px; border: 1px solid #aecbfa; border-radius: 5px; background: white; font-family: inherit; box-sizing: border-box; resize: none; font-size: 1.1rem; }
        .copy-btn { background: #34a853; margin-top: 10px; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Vamos</h1>
    <p style="margin-bottom:20px; color:#666;">Contador de días exacto</p>

    <button onclick="procesarFrase()">Generar Frase Actualizada 🚀</button>

    <div id="resultado-container">
        <textarea id="texto-final" readonly></textarea>
        <button class="copy-btn" onclick="copiarAlPortapapeles()">Copiar al Portapapeles 📋</button>
    </div>
</div>

<script>
    // DATOS CORREGIDOS CON TUS FECHAS REALES
    const datosPersonas = [
        { nombre: "los románticos", fecha: "2025-12-31" }, 
        { nombre: "Erich", fecha: "2014-12-22" }, // Fecha exacta de Erich
        { nombre: "Lucía", fecha: "2017-06-16" }, // Fecha exacta de Lucía
        { nombre: "Martín", fecha: "2013-01-02" }, 
        { nombre: "Diego", fecha: "2018-07-12" }, 
        { nombre: "", fecha: "2020-07-11" } 
    ];

    function procesarFrase() {
        let textoFinal = "";
        const hoy = new Date();
        // Ponemos la hora a las 23:59 para asegurar que cuente el día actual completo
        hoy.setHours(23, 59, 59, 999); 

        datosPersonas.forEach((p, index) => {
            const fechaInicio = new Date(p.fecha);
            // La fecha de nacimiento empieza a las 00:00
            fechaInicio.setHours(0, 0, 0, 0);

            const diff = hoy.getTime() - fechaInicio.getTime();
            const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            const esUltimo = (index === datosPersonas.length - 1);
            
            if (esUltimo) {
                // Formato con 4 espacios para el último elemento
                textoFinal += "Feliz día " + dias + (p.nombre ? "    " + p.nombre : "");
            } else {
                textoFinal += "Feliz día " + dias + " para " + p.nombre + " ";
            }
        });

        document.getElementById('texto-final').value = textoFinal;
        document.getElementById('resultado-container').style.display = 'block';
    }

    function copiarAlPortapapeles() {
        const textArea = document.getElementById('texto-final');
        textArea.select();
        navigator.clipboard.writeText(textArea.value);
        
        const btn = document.querySelector('.copy-btn');
        btn.innerHTML = "¡Copiado! ✅";
        setTimeout(() => { btn.innerHTML = "Copiar al Portapapeles 📋"; }, 2000);
    }
</script>

</body>
</html>
