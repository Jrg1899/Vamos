<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vamos 📝</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; color: #333; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #1a73e8; font-size: 2rem; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #resultado-container { margin-top: 25px; padding: 15px; background: #e8f0fe; border-radius: 8px; display: none; }
        #texto-final { width: 100%; height: 140px; margin-bottom: 10px; padding: 10px; border: 1px solid #aecbfa; border-radius: 5px; background: white; font-family: inherit; box-sizing: border-box; resize: none; font-size: 1.1rem; }
        .copy-btn { background: #34a853; margin-top: 10px; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Vamos</h1>
    <button onclick="procesarFrase()">Generar Frase Exacta 🚀</button>

    <div id="resultado-container">
        <textarea id="texto-final" readonly></textarea>
        <button class="copy-btn" onclick="copiarAlPortapapeles()">Copiar al Portapapeles 📋</button>
    </div>
</div>

<script>
    function procesarFrase() {
        const hoy = new Date();
        const hoyCalculo = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate(), 12, 0, 0);

        // 1. Día del año (Ajustado para que hoy 27 de abril sea 117)
        const inicioAnio = new Date(hoy.getFullYear(), 0, 0, 12, 0, 0);
        const diaAnio = Math.floor((hoyCalculo - inicioAnio) / 86400000);

        // Función de cálculo base
        function diasDesde(fechaStr) {
            const inicio = new Date(fechaStr);
            inicio.setHours(12, 0, 0, 0);
            return Math.floor((hoyCalculo - inicio) / 86400000);
        }

        // FECHAS AJUSTADAS UNA A UNA PARA TUS RESULTADOS:
        const romanticos = diaAnio; // Usamos directamente el 117
        const erich = diasDesde("2013-01-01") + 1;  // Resulta en 4864
        const lucia = diasDesde("2014-12-22") + 1;  // Resulta en 4144
        const martin = diasDesde("2017-06-16");     // Resulta en 3237
        const diego = diasDesde("2018-07-12");      // Resulta en 2846
        const ultimo = diasDesde("2020-07-11");     // Resulta en 2116

        // Construcción de la frase
        const frase = `Feliz día ${romanticos} para los románticos ` +
                      `Feliz día ${erich} para Erich ` +
                      `Feliz día ${lucia} para Lucía ` +
                      `Feliz día ${martin} para Martín ` +
                      `Feliz día ${diego} para Diego ` +
                      `Feliz día ${ultimo}`;

        document.getElementById('texto-final').value = frase;
        document.getElementById('resultado-container').style.display = 'block';
    }

    function copiarAlPortapapeles() {
        const textArea = document.getElementById('texto-final');
        textArea.select();
        document.execCommand('copy');
        const btn = document.querySelector('.copy-btn');
        btn.innerHTML = "¡Copiado! ✅";
        setTimeout(() => { btn.innerHTML = "Copiar al Portapapeles 📋"; }, 2000);
    }
</script>

</body>
</html>
